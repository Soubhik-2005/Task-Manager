<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />

  </head>
  <body>
    <div class="task-manager">
      <h1>Task - Manager</h1>

      <div class="displayParent">
      
      </div>

      <div class="form-div">
      <form action="" class="form">
        <div class="task flex">
          <!-- <label for="task-input">Enter your task here...</label> -->
          <input type="text" placeholder="Enter your task here..." id="task-input" />
        </div>
        <div class="purpose flex">
          <!-- <label for="dropdown">Enter your purpose</label> -->
          <select name="dropdown" id="dropdown">
            <option value="Purpose">Choose your purpose here </option>
            <option value="Personal">Personal</option>
            <option value="Work">Work</option>
            <option value="Study">Study</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <button type="submit" class="submit">Add Task</button>
      </form>
      </div>

      <div class="card-area">
        <!-- <div class="card">
            <p>Java script</p>
            <div class="btn">
            <button class="completed">Completed</button>
            <button class="edit">Edit</button>
            <button class="delete">Delete</button>
            </div>
        </div> -->
      </div>
  
    </div>

   
   <div class="outer-edit-div"></div>
   
  <script src="/script.js"></script>
</body>

</html>
